<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{POST_TITLE}}</title>
  <!-- BLOGGER_CSS_INJECT_START -->
  <style>
    /* =============================================
       BASE TEMPLATE — edite só o <body> do post
       ============================================= */
    :root {
      --font-body: 'Georgia', serif;
      --font-code: 'Fira Code', 'Courier New', monospace;
      --color-bg: #ffffff;
      --color-text: #1a1a2e;
      --color-accent: #e94560;
      --color-accent2: #0f3460;
      --color-muted: #6b7280;
      --color-border: #e5e7eb;
      --color-code-bg: #f8fafc;
      --color-blockquote: #f1f5f9;
      --radius: 8px;
      --max-width: 760px;
    }

    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Body base */
    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.8;
      font-size: 18px;
    }

    /* Container centralizado */
    .post-content {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Títulos */
    h1, h2, h3, h4 {
      font-family: var(--font-body);
      color: var(--color-accent2);
      line-height: 1.3;
      margin: 2rem 0 1rem;
    }
    h1 { font-size: 2.2rem; color: var(--color-accent2); border-bottom: 3px solid var(--color-accent); padding-bottom: 0.5rem; }
    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.25rem; }

    /* Parágrafos */
    p { margin-bottom: 1.4rem; }

    /* Links */
    a { color: var(--color-accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    a:hover { border-color: var(--color-accent); }

    /* Imagens */
    img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      margin: 1.5rem 0;
      display: block;
    }
    figure { margin: 2rem 0; }
    figcaption { text-align: center; font-size: 0.85rem; color: var(--color-muted); margin-top: 0.5rem; }

    /* Blockquote */
    blockquote {
      background: var(--color-blockquote);
      border-left: 4px solid var(--color-accent);
      padding: 1rem 1.5rem;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin: 1.5rem 0;
      font-style: italic;
      color: var(--color-muted);
    }

    /* Código inline */
    code {
      font-family: var(--font-code);
      background: var(--color-code-bg);
      border: 1px solid var(--color-border);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.88em;
    }

    /* Bloco de código */
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 1.5rem;
      border-radius: var(--radius);
      overflow-x: auto;
      margin: 1.5rem 0;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    /* Listas */
    ul, ol { padding-left: 1.5rem; margin-bottom: 1.4rem; }
    li { margin-bottom: 0.5rem; }

    /* Tabela */
    table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.95rem; }
    th { background: var(--color-accent2); color: #fff; padding: 0.75rem 1rem; text-align: left; }
    td { padding: 0.65rem 1rem; border-bottom: 1px solid var(--color-border); }
    tr:hover td { background: var(--color-blockquote); }

    /* Highlight box (use class="highlight-box") */
    .highlight-box {
      background: linear-gradient(135deg, #fff7ed, #fef3c7);
      border: 1px solid #fcd34d;
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
    }

    /* Tag / badge (use class="tag") */
    .tag {
      display: inline-block;
      background: var(--color-accent);
      color: #fff;
      font-size: 0.75rem;
      padding: 0.2em 0.7em;
      border-radius: 20px;
      margin: 0.2rem;
      font-family: sans-serif;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* Separador */
    hr { border: none; border-top: 2px solid var(--color-border); margin: 2.5rem 0; }

    /* Responsivo */
    @media (max-width: 600px) {
      body { font-size: 16px; }
      h1 { font-size: 1.7rem; }
      h2 { font-size: 1.3rem; }
      .post-content { padding: 1rem; }
    }
  </style>
  <!-- BLOGGER_CSS_INJECT_END -->
</head>
<body>
  <div class="post-content">
    <!-- ====================================================
         ✏️  EDITE APENAS AQUI ABAIXO
         Escreva seu post em HTML puro.
         CSS e JS já estão aplicados automaticamente.
         ==================================================== -->

    <h1>{{POST_TITLE}}</h1>

    {{POST_BODY}}

    <!-- ====================================================
         ✏️  FIM DO CONTEÚDO EDITÁVEL
         ==================================================== -->
  </div>

  <!-- BLOGGER_JS_INJECT_START -->
  <script>
    /* =============================================
       JS BASE — copy-to-clipboard em blocos <pre>
       ============================================= */
    document.querySelectorAll('pre').forEach(function(block) {
      var btn = document.createElement('button');
      btn.textContent = 'copiar';
      btn.style.cssText = 'position:absolute;top:10px;right:10px;padding:4px 10px;font-size:12px;' +
        'background:#e94560;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:sans-serif;';
      block.style.position = 'relative';
      block.appendChild(btn);
      btn.addEventListener('click', function() {
        var code = block.querySelector('code') || block;
        navigator.clipboard.writeText(code.innerText).then(function() {
          btn.textContent = 'copiado!';
          setTimeout(function() { btn.textContent = 'copiar'; }, 1500);
        });
      });
    });

    /* Smooth scroll para âncoras */
    document.querySelectorAll('a[href^="#"]').forEach(function(a) {
      a.addEventListener('click', function(e) {
        var target = document.querySelector(this.getAttribute('href'));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  </script>
  <!-- BLOGGER_JS_INJECT_END -->
</body>
</html>
